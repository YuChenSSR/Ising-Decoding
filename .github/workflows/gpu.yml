# GPU tests run on self-hosted NVIDIA runners.
# Triggered manually or on pull-request branches once runners are configured.
#
# To enable automatic GPU CI:
#   1. Register a self-hosted GPU runner for this repo (or request one from the org admin).
#   2. Set the runner label below (default: linux-amd64-gpu-h100-latest-1).
#   3. Uncomment the push trigger below.

name: GPU

on:
  workflow_dispatch:
    inputs:
      gpu_runner:
        description: "Self-hosted GPU runner label"
        required: false
        default: "linux-amd64-gpu-h100-latest-1"
  # Uncomment once GPU runners are registered for this repo:
  # push:
  #   branches:
  #     - main
  #     - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_NO_CACHE_DIR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_PREFER_BINARY: "1"

jobs:
  gpu-tests:
    runs-on: ${{ inputs.gpu_runner || 'linux-amd64-gpu-h100-latest-1' }}
    if: github.repository == 'NVIDIA/quantum-predecoder'
    container:
      image: ubuntu:22.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 30
    steps:
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs python3 python3-pip python3-venv
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_inference.txt

      - name: Verify GPU
        run: |
          nvidia-smi
          python3 -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'; print(torch.cuda.get_device_name(0))"

      - name: Run full test suite (CPU + GPU)
        run: PYTHONPATH=code python3 -m unittest discover -s code/tests -p "test_*.py"

  smoke-test-gpu:
    runs-on: ${{ inputs.gpu_runner || 'linux-amd64-gpu-h100-latest-1' }}
    if: github.repository == 'NVIDIA/quantum-predecoder'
    needs: gpu-tests
    container:
      image: ubuntu:22.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 30
    steps:
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs python3 python3-pip python3-venv
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_train.txt

      - name: Verify GPU
        run: |
          nvidia-smi
          python3 -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"

      - name: Smoke training + inference
        run: bash code/scripts/smoke_run.sh
        env:
          EXPERIMENT_NAME: ci_smoke
          PREDECODER_TRAIN_SAMPLES: "4096"
          PREDECODER_VAL_SAMPLES: "512"
          PREDECODER_TEST_SAMPLES: "512"
          PREDECODER_TRAIN_EPOCHS: "1"
