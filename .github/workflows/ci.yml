name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIP_NO_CACHE_DIR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_PREFER_BINARY: "1"

# ---------------------------------------------------------------------------
# CPU jobs
# ---------------------------------------------------------------------------
jobs:
  spdx-header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 code/scripts/spdx_headers.py --check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_inference.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: PYTHONPATH=code python -m unittest discover -s code/tests -p "test_*.py"

  unit-tests-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_inference.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r code/requirements_ci.txt
      - name: Run tests with coverage
        run: |
          PYTHONPATH=code coverage run -m unittest discover -s code/tests -p "test_*.py"
          coverage report
          coverage html -d htmlcov
          coverage xml -o coverage.xml
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

  python-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        mode: [inference, train]
    name: "compat / py${{ matrix.python-version }} / ${{ matrix.mode }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check Python compatibility
        run: bash code/scripts/check_python_compat.sh
        env:
          MODE: ${{ matrix.mode }}
          PYTHON_BIN: python
          SKIP_TESTS: "1"
          PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu"

  # ---------------------------------------------------------------------------
  # GPU jobs — require a self-hosted runner with NVIDIA GPU
  # ---------------------------------------------------------------------------
  gpu-tests:
    runs-on: linux-amd64-gpu-l4-latest-1
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_inference.txt
      - name: Verify GPU
        run: |
          nvidia-smi
          python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"
      - name: Run full test suite (CPU + GPU)
        run: PYTHONPATH=code python -m unittest discover -s code/tests -p "test_*.py"

  smoke-test-gpu:
    runs-on: linux-amd64-gpu-l4-latest-1
    needs: gpu-tests
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_train.txt
      - name: Verify GPU
        run: |
          nvidia-smi
          python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"
      - name: Smoke training + inference
        run: bash code/scripts/smoke_run.sh
        env:
          EXPERIMENT_NAME: ci_smoke
          PREDECODER_TRAIN_SAMPLES: "4096"
          PREDECODER_VAL_SAMPLES: "512"
          PREDECODER_TEST_SAMPLES: "512"
          PREDECODER_TRAIN_EPOCHS: "1"
