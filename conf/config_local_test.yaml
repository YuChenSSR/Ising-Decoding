# Temporary local test config for quick training/inference verification
# This file is not intended for production; used only for local short runs.

model_id: 1

# Small problem size for quick tests
distance: 3
n_rounds: 3

workflow:
  task: train

data:
  code_rotation: O1
  # Torch generator requires decompose_y=False
  # Use default public noise model values (copied minimal fields)
  noise_model:
    p_prep_X: 0.002
    p_prep_Z: 0.002
    p_meas_X: 0.002
    p_meas_Z: 0.002
    p_idle_cnot_X: 0.001
    p_idle_cnot_Y: 0.001
    p_idle_cnot_Z: 0.001
    p_idle_spam_X: 0.001998
    p_idle_spam_Y: 0.001998
    p_idle_spam_Z: 0.001998
    p_cnot_IX: 0.0002
    p_cnot_IY: 0.0002
    p_cnot_IZ: 0.0002
    p_cnot_XI: 0.0002
    p_cnot_XX: 0.0002
    p_cnot_XY: 0.0002
    p_cnot_XZ: 0.0002
    p_cnot_YI: 0.0002
    p_cnot_YX: 0.0002
    p_cnot_YY: 0.0002
    p_cnot_YZ: 0.0002
    p_cnot_ZI: 0.0002
    p_cnot_ZX: 0.0002
    p_cnot_ZY: 0.0002
    p_cnot_ZZ: 0.0002
